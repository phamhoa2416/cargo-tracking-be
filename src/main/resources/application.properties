spring.application.name=CargoTracker

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Rate Limiting Configuration
rate-limit.default=10.0
rate-limit.endpoints=/api/auth/login:5.0,/api/auth/register:3.0
rate-limit.cleanup-interval-minutes=60
